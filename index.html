<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar styling for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 bg-gray-950 flex flex-col h-full border-r border-gray-800 transition-all duration-300 md:translate-x-0 -translate-x-full absolute md:relative z-20">
        <div class="p-4">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-medium py-2.5 px-4 rounded-lg border border-gray-700 transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Chat
            </button>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
            </div>

        <div class="p-4 border-t border-gray-800 bg-gray-950">
            <button onclick="toggleModal('settings-modal', true)" class="w-full flex items-center gap-3 hover:bg-gray-800 p-2.5 rounded-lg transition-colors text-gray-400 hover:text-white">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-sm font-medium">API Settings</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-gray-900 relative">
        
        <header class="h-14 border-b border-gray-800 flex items-center justify-between px-4 bg-gray-900/50 backdrop-blur">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <h1 id="current-model-display" class="text-sm font-medium text-gray-300 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    Universal Chat
                </h1>
            </div>
            <div class="text-xs text-gray-500 hidden sm:block">Powered by OpenRouter</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 max-w-4xl w-full mx-auto flex flex-col justify-end">
            <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center text-center p-8">
                <div class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center mb-4 border border-gray-700 shadow-xl">
                    <i data-lucide="bot" class="w-8 h-8 text-indigo-400"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">How can I help you today?</h2>
                <p class="text-gray-400 max-w-md text-sm">Configure your API Key in Settings to begin chatting with any model available on OpenRouter.</p>
            </div>
            
            <div id="messages-container" class="space-y-6 w-full hidden"></div>
        </div>

        <footer class="p-4 bg-gradient-to-t from-gray-900 via-gray-900 to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <form id="chat-form" onsubmit="handleSendMessage(event)" class="bg-gray-800 border border-gray-700 rounded-xl focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition-all flex items-end p-2 pr-3">
                    <textarea id="user-input" rows="1" placeholder="Message AI..." class="flex-1 max-h-48 resize-none bg-transparent border-0 outline-none text-gray-100 placeholder-gray-400 px-3 py-2 text-sm focus:ring-0" oninput="autoResizeTextarea(this)"></textarea>
                    <button type="submit" id="send-button" class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-700 disabled:text-gray-500 text-white p-2 rounded-lg transition-colors cursor-pointer disabled:cursor-not-allowed">
                        <i data-lucide="send-horizontal" class="w-4 h-4"></i>
                    </button>
                </form>
                <p class="text-center text-[10px] text-gray-500 mt-2">AI can make mistakes. Verify important information.</p>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200">
            <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-white">API Configuration</h3>
                <button onclick="toggleModal('settings-modal', false)" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">OpenRouter API Key</label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">Model Identifier</label>
                    <input type="text" id="setting-model" placeholder="google/gemini-2.5-flash" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500">
                    <p class="text-[11px] text-gray-500 mt-1">Provide a valid OpenRouter model slug (e.g., <code class="text-gray-400">google/gemini-2.5-pro</code>)</p>
                </div>
            </div>
            <div class="px-6 py-3.5 bg-gray-850 border-t border-gray-700 flex justify-end gap-2.5">
                <button onclick="toggleModal('settings-modal', false)" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let AppState = {
            chats: JSON.parse(localStorage.getItem('universal_ai_chats')) || [],
            activeChatId: localStorage.getItem('universal_ai_active_id') || null,
            settings: JSON.parse(localStorage.getItem('universal_ai_settings')) || {
                apiKey: '',
                model: 'google/gemini-2.5-flash' // sensible default
            }
        };

        // --- Core Application Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadSettingsIntoDOM();
            renderChatList();
            
            if (AppState.activeChatId) {
                loadChat(AppState.activeChatId);
            } else if (AppState.chats.length > 0) {
                loadChat(AppState.chats[0].id);
            }
            updateModelHeader();
        });

        // --- UI Interactions & Handlers ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function toggleModal(modalId, show) {
            const modal = document.getElementById(modalId);
            const content = modal.querySelector('div');
            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                content.classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }
        }

        function autoResizeTextarea(element) {
            element.style.height = 'auto';
            element.style.height = (element.scrollHeight) + 'px';
        }

        // --- Settings Subsystem ---
        function loadSettingsIntoDOM() {
            document.getElementById('setting-api-key').value = AppState.settings.apiKey;
            document.getElementById('setting-model').value = AppState.settings.model;
        }

        function saveSettings() {
            AppState.settings.apiKey = document.getElementById('setting-api-key').value.trim();
            AppState.settings.model = document.getElementById('setting-model').value.trim() || 'google/gemini-2.5-flash';
            
            localStorage.setItem('universal_ai_settings', JSON.stringify(AppState.settings));
            updateModelHeader();
            toggleModal('settings-modal', false);
            
            if(!AppState.settings.apiKey) {
                alert("Warning: No API key saved. Requests will fail until an OpenRouter key is provided.");
            }
        }

        function updateModelHeader() {
            const modelName = AppState.settings.model.split('/').pop().toUpperCase();
            document.getElementById('current-model-display').innerHTML = `
                <span class="w-2 h-2 rounded-full ${AppState.settings.apiKey ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                ${modelName}
            `;
        }

        // --- Chat Engines & Persistence ---
        function createNewChat() {
            const newChat = {
                id: 'chat_' + Date.now(),
                title: 'New conversation',
                messages: []
            };
            AppState.chats.unshift(newChat);
            AppState.activeChatId = newChat.id;
            saveState();
            
            renderChatList();
            loadChat(newChat.id);
            
            // Close mobile sidebar if open
            document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        function loadChat(chatId) {
            AppState.activeChatId = chatId;
            localStorage.setItem('universal_ai_active_id', chatId);
            renderChatList();

            const chat = AppState.chats.find(c => c.id === chatId);
            const welcomeScreen = document.getElementById('welcome-screen');
            const messagesContainer = document.getElementById('messages-container');
            
            messagesContainer.innerHTML = '';

            if (!chat || chat.messages.length === 0) {
                welcomeScreen.classList.remove('hidden');
                messagesContainer.classList.add('hidden');
            } else {
                welcomeScreen.classList.add('hidden');
                messagesContainer.classList.remove('hidden');
                
                chat.messages.forEach(msg => appendMessageMarkup(msg.role, msg.content));
                scrollToBottom();
            }
        }

        function deleteChat(chatId, event) {
            event.stopPropagation(); // Stop row click triggering loadChat
            AppState.chats = AppState.chats.filter(c => c.id !== chatId);
            
            if (AppState.activeChatId === chatId) {
                AppState.activeChatId = AppState.chats.length > 0 ? AppState.chats[0].id : null;
            }
            
            saveState();
            renderChatList();
            
            if (AppState.activeChatId) {
                loadChat(AppState.activeChatId);
            } else {
                document.getElementById('welcome-screen').classList.remove('hidden');
                document.getElementById('messages-container').classList.add('hidden');
            }
        }

        function renderChatList() {
            const container = document.getElementById('chat-list');
            container.innerHTML = '';

            AppState.chats.forEach(chat => {
                const isActive = chat.id === AppState.activeChatId;
                const activeClasses = isActive ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900 hover:text-gray-200';
                
                const item = document.createElement('div');
                item.className = `group flex items-center justify-between p-2.5 rounded-lg cursor-pointer transition-colors text-sm ${activeClasses}`;
                item.setAttribute('onclick', `loadChat('${chat.id}')`);
                
                item.innerHTML = `
                    <div class="flex items-center gap-2.5 overflow-hidden w-full">
                        <i data-lucide="message-square" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate pr-2">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-rose-400 rounded transition-opacity shrink-0">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                container.appendChild(item);
            });
            lucide.createIcons();
        }

        function saveState() {
            localStorage.setItem('universal_ai_chats', JSON.stringify(AppState.chats));
            if (AppState.activeChatId) {
                localStorage.setItem('universal_ai_active_id', AppState.activeChatId);
            } else {
                localStorage.removeItem('universal_ai_active_id');
            }
        }

        // --- Chat UI Presentation Renderers ---
        function appendMessageMarkup(role, content) {
            const container = document.getElementById('messages-container');
            const isUser = role === 'user';
            
            const messageWrapper = document.createElement('div');
            messageWrapper.className = `flex gap-4 max-w-3xl w-full mx-auto ${isUser ? 'justify-end' : 'justify-start'}`;

            const avatarHtml = isUser 
                ? `<div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-semibold text-xs shrink-0 shadow-md">U</div>`
                : `<div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center text-white shrink-0 shadow-md"><i data-lucide="bot" class="w-4 h-4"></i></div>`;

            // White-space handling preserved for basic message text formatting block layouts
            const messageBubble = `
                <div class="flex flex-col space-y-1 max-w-[85%] ${isUser ? 'order-1 items-end' : 'order-2'}">
                    <div class="text-[11px] text-gray-500 font-medium px-1">${isUser ? 'You' : 'AI Assistant'}</div>
                    <div class="rounded-xl px-4 py-2.5 text-sm leading-relaxed shadow-sm whitespace-pre-wrap ${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-100 border border-gray-700 rounded-tl-none'}">
                        ${escapeHTML(content)}
                    </div>
                </div>
            `;

            messageWrapper.innerHTML = isUser ? `${messageBubble}${avatarHtml}` : `${avatarHtml}${messageBubble}`;
            container.appendChild(messageWrapper);
            lucide.createIcons();
        }

        function scrollToBottom() {
            const win = document.getElementById('chat-window');
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function setComposerDisabled(disabled) {
            document.getElementById('user-input').disabled = disabled;
            document.getElementById('send-button').disabled = disabled;
        }

        // --- HTTP Network Communication Layer ---
        async function handleSendMessage(event) {
            event.preventDefault();
            
            const inputField = document.getElementById('user-input');
            const userPrompt = inputField.value.trim();
            if (!userPrompt) return;

            if (!AppState.settings.apiKey) {
                alert("Please add an OpenRouter API Key via Settings before executing chat queries.");
                toggleModal('settings-modal', true);
                return;
            }

            // If there's no initialized active session context, initialize one
            if (!AppState.activeChatId) {
                createNewChat();
            }

            // Retrieve current target tracking configuration state pointer
            const currentChat = AppState.chats.find(c => c.id === AppState.activeChatId);
            
            // Build outbound runtime payload references
            currentChat.messages.push({ role: 'user', content: userPrompt });
            
            // Auto-generate UI conversational header context conditionally
            if (currentChat.title === 'New conversation') {
                currentChat.title = userPrompt.length > 26 ? userPrompt.substring(0, 25) + '...' : userPrompt;
            }

            // UI view syncing mutations execution
            inputField.value = '';
            inputField.style.height = 'auto';
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('messages-container').classList.remove('hidden');
            
            appendMessageMarkup('user', userPrompt);
            renderChatList();
            saveState();
            scrollToBottom();
            setComposerDisabled(true);

            // Setup mock UI elements generation for response streaming buffer allocations
            const messagesContainer = document.getElementById('messages-container');
            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = "flex gap-4 max-w-3xl w-full mx-auto justify-start animate-pulse";
            loadingWrapper.id = "async-ui-loader";
            loadingWrapper.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-gray-700 flex items-center justify-center text-white shrink-0"><i data-lucide="bot" class="w-4 h-4"></i></div>
                <div class="flex flex-col space-y-2 max-w-[85%] w-full">
                    <div class="h-3 bg-gray-700 rounded w-24"></div>
                    <div class="h-10 bg-gray-800 rounded-xl w-full"></div>
                </div>
            `;
            messagesContainer.appendChild(loadingWrapper);
            lucide.createIcons();
            scrollToBottom();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${AppState.settings.apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Universal AI Interface"
